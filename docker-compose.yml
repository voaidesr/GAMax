services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gamax-backend
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gamax-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
